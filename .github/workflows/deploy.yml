name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # -------------------
      # FRONTEND
      # -------------------
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # -------------------
      # BACKEND
      # -------------------
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      # Restart Backend
      - name: Restart backend
        working-directory: ./backend
        run: |
          pm2 restart all || pm2 start npm --name backend -- start